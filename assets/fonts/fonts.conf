<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <dir>.</dir>
  <cachedir>/tmp/fontconfig-cache</cachedir>
  
  <!-- Map Nyala to bundled Nyala.ttf -->
  <match target="pattern">
    <test qual="any" name="family"><string>Nyala</string></test>
    <edit name="family" mode="assign" binding="same"><string>Nyala</string></edit>
  </match>
  
  <!-- Map Noto Sans Ethiopic to bundled NotoSansEthiopic-Regular.ttf -->
  <match target="pattern">
    <test qual="any" name="family"><string>Noto Sans Ethiopic</string></test>
    <edit name="family" mode="assign" binding="same"><string>Noto Sans Ethiopic</string></edit>
  </match>
  
  <!-- Fallback for QZEmbedded to use Noto Sans Ethiopic -->
  <match target="pattern">
    <test qual="any" name="family"><string>QZEmbedded</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Noto Sans Ethiopic</string></edit>
  </match>
</fontconfig>
